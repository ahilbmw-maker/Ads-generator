<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nabiranje zaloge — Maaarket</title>
<style>
  :root {
    --bg: #eef1f8;
    --shelf-bg: #faf7ef;
    --panel: #ffffff;
    --panel2: #f8fafd;
    --panel3: #eef1f7;
    --border: #e4e8f0;
    --border2: #d4dae6;
    --text: #0f172a;
    --text-dim: #5a6478;
    --text-faint: #94a0b3;
    --accent: #4f6ef7;
    --accent-dim: #e8edfe;
    --ok: #16a34a;
    --ok-bg: #e7f6ec;
    --ok-border: #b8e6c4;
    --ni: #e2453f;
    --ni-bg: #fdeceb;
    --ni-border: #f6c7c4;
    --warn: #d97706;
    --warn-bg: #fdf0dc;
    --shadow: 0 4px 16px rgba(15,23,42,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    max-width: 100%;
  }
  body {
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 14px 22px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .logo {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, var(--accent), #2dd4a7);
    display: grid; place-items: center; font-size: 18px;
    box-shadow: 0 4px 12px rgba(79,142,247,0.35);
  }
  .brand h1 { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
  .brand .sub { font-size: 11px; color: var(--text-faint); font-weight: 500; }

  .topbar-spacer { flex: 1; }

  .global-stat {
    display: flex; align-items: center; gap: 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 16px;
  }
  .global-stat .ring { position: relative; width: 44px; height: 44px; }
  .global-stat .ring svg { transform: rotate(-90deg); }
  .global-stat .ring .pct {
    position: absolute; inset: 0; display: grid; place-items: center;
    font-size: 11px; font-weight: 800; color: var(--text);
  }
  .global-stat .meta { display: flex; flex-direction: column; }
  .global-stat .meta .big { font-size: 15px; font-weight: 800; }
  .global-stat .meta .small { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.6px; }

  .btn {
    border: 1px solid var(--border2); background: var(--panel2);
    color: var(--text); border-radius: 10px; padding: 9px 15px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { background: var(--panel3); border-color: var(--accent); }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-accent:hover { background: #3d7de8; }
  .btn-ghost { background: transparent; border-color: var(--border); }
  .btn-sm { padding: 6px 11px; font-size: 12px; }

  /* ─── LAYOUT ─── */
  .wrap { max-width: 1600px; margin: 0; padding: 22px; display: grid; grid-template-columns: 1fr 380px; gap: 22px; align-items: start; }
  @media (max-width: 1100px) { .wrap { grid-template-columns: 1fr; } }

  /* ─── UPLOAD ZONE ─── */
  .upload-card {
    background: var(--panel); border: 1.5px dashed var(--border2);
    border-radius: 16px; padding: 40px; text-align: center;
    grid-column: 1 / -1;
  }
  .upload-card h2 { font-size: 18px; margin-bottom: 6px; }
  .upload-card p { color: var(--text-dim); font-size: 13px; margin-bottom: 18px; }

  /* ─── SHELF (zavihek) ─── */
  .shelves { display: flex; flex-direction: column; gap: 12px; }
  .shelf {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    transition: border-color 0.2s;
  }
  .shelf.open { border-color: var(--border2); box-shadow: var(--shadow); }
  .shelf-head {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 18px; cursor: pointer; user-select: none;
    transition: background 0.15s;
  }
  .shelf-head:hover { background: var(--panel2); }
  .shelf-chevron {
    font-size: 14px; color: var(--text-faint); transition: transform 0.25s;
    width: 16px; text-align: center;
  }
  .shelf.open .shelf-chevron { transform: rotate(90deg); color: var(--accent); }
  .shelf-name { font-size: 16px; font-weight: 800; letter-spacing: -0.2px; }
  .shelf-count {
    font-size: 11px; color: var(--text-dim); background: var(--panel3);
    padding: 2px 9px; border-radius: 20px; font-weight: 600;
  }
  .shelf-head-spacer { flex: 1; }

  /* shelf progress */
  .shelf-prog { display: flex; align-items: center; gap: 10px; }
  .shelf-prog-bar {
    width: 120px; height: 7px; background: var(--panel3);
    border-radius: 10px; overflow: hidden;
  }
  .shelf-prog-fill {
    height: 100%; border-radius: 10px;
    background: linear-gradient(90deg, var(--ok), #36e0b4);
    transition: width 0.4s ease;
  }
  .shelf-prog-pct { font-size: 13px; font-weight: 800; min-width: 42px; text-align: right; }
  /* Segmentiran bar: nabrano (zeleno) / ni najdeno (rdeče) / še nabirajo (sivo) */
  .prog-seg-wrap { display: flex; }
  .prog-seg { height: 100%; transition: width 0.4s ease; }
  .prog-seg-ok { background: linear-gradient(90deg, var(--ok), #36e0b4); }
  .prog-seg-ni { background: var(--ni); }
  .prog-seg-todo { background: var(--panel3); }

  .shelf-body { display: none; padding: 0; }
  .shelf.open .shelf-body { display: block; animation: slideDown 0.25s ease; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  /* ─── ITEM TABLE HEADER (Koncept A) ─── */
  .item-head {
    display: grid;
    grid-template-columns: 90px 120px 78px 1fr 130px 90px;
    gap: 14px; padding: 9px 14px;
    font-size: 10px; font-weight: 600; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    text-align: left;
  }
  .item-head .h-qty, .item-head .h-status { text-align: center; }

  /* ─── ITEM ROW (Koncept A) ─── */
  .item {
    display: grid;
    grid-template-columns: 90px 120px 78px 1fr 130px 90px;
    gap: 14px; align-items: center;
    padding: 12px 14px;
    border: none; border-bottom: 1px solid var(--border);
    transition: background 0.12s;
    margin: 0;
  }
  /* desktop: wrapperji so "transparentni" → otroci ostanejo direktni grid-otroci */
  .item-mobile-top { display: contents; }
  .item-bottom { display: contents; }
  .item:hover { background: var(--panel2); }
  .item.ok { background: var(--ok-bg); }
  .item.ni { background: var(--ni-bg); }
  .item:last-child { border-bottom: none; }

  .item .sku { font-weight: 600; font-size: 14px; font-variant-numeric: tabular-nums; text-align: left; overflow: hidden; text-overflow: ellipsis; }
  .item .poz {
    font-size: 12px; font-weight: 600; color: var(--accent);
    background: var(--accent-dim); padding: 4px 9px; border-radius: 7px;
    text-align: center; letter-spacing: 0.2px; justify-self: start;
  }
  .item .naziv { font-size: 13px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item .id-col { font-size: 12px; color: var(--text-faint); font-variant-numeric: tabular-nums; }

  /* qty stepper */
  .qty-step { display: flex; align-items: center; gap: 6px; }
  .qty-btn {
    width: 30px; height: 30px; border-radius: 8px;
    border: 1px solid var(--border2); background: var(--panel3);
    color: var(--text); font-size: 17px; font-weight: 700; cursor: pointer;
    display: grid; place-items: center; transition: all 0.12s; line-height: 1;
  }
  .qty-btn:hover { background: var(--accent); border-color: var(--accent); }
  .qty-btn:active { transform: scale(0.9); }
  .qty-val {
    min-width: 30px; text-align: center; font-size: 15px; font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
  .qty-step > div[onclick] { cursor: pointer; border-radius: 6px; transition: background 0.12s; }
  .qty-step > div[onclick]:hover { background: var(--panel3); }
  .qty-need { font-size: 10px; color: var(--text-faint); }
  .qty-mismatch .qty-val { color: var(--warn); }

  /* action buttons */
  .item-actions { display: flex; gap: 6px; }
  .act-btn {
    flex: 1; border: 1px solid var(--border2); background: var(--panel3);
    border-radius: 8px; padding: 7px 0; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.12s; display: grid; place-items: center;
    color: var(--text-dim);
  }
  /* privzeto že barvana — takoj jasno kaj je kaj */
  .act-ok { background: var(--ok-bg); border-color: var(--ok-border); color: var(--ok); }
  .act-ni { background: var(--ni-bg); border-color: var(--ni-border); color: var(--ni); }
  .act-ok:hover, .act-ok.active { background: var(--ok); border-color: var(--ok); color: #fff; }
  .act-ni:hover, .act-ni.active { background: var(--ni); border-color: var(--ni); color: #fff; }

  /* low stock tag */
  .tag-low {
    font-size: 9px; font-weight: 800; color: var(--warn);
    background: var(--warn-bg); border: 1px solid rgba(245,165,36,0.3);
    padding: 1px 6px; border-radius: 5px; text-transform: uppercase;
    letter-spacing: 0.4px; margin-left: 6px; white-space: nowrap;
  }

  /* ─── SIDEBAR (manjko) ─── */
  .sidebar { position: sticky; top: 90px; display: flex; flex-direction: column; gap: 16px; }
  .side-card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
  .side-card h3 { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-dim); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .side-card h3 .badge { background: var(--ni); color: #fff; font-size: 11px; padding: 1px 8px; border-radius: 20px; margin-left: auto; }

  .manko-list { display: flex; flex-direction: column; gap: 8px; max-height: 60vh; overflow-y: auto; }
  .manko-item {
    background: var(--ni-bg); border: 1px solid var(--ni-border);
    border-radius: 9px; padding: 9px 11px;
  }
  .manko-item .top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .manko-item .msku { font-weight: 800; font-size: 13px; }
  .manko-item .mqty { font-size: 11px; color: var(--ni); font-weight: 700; }
  .manko-item .mnaziv { font-size: 11px; color: var(--text-dim); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .manko-item .mpoz { font-size: 10px; color: var(--text-faint); margin-top: 2px; }
  .manko-empty { text-align: center; color: var(--text-faint); font-size: 12px; padding: 20px; }

  .stat-rows { display: flex; flex-direction: column; gap: 10px; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .stat-row .lbl { color: var(--text-dim); }
  .stat-row .val { font-weight: 800; font-variant-numeric: tabular-nums; }
  .stat-row .val.ok { color: var(--ok); }
  .stat-row .val.ni { color: var(--ni); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--panel3); border: 1px solid var(--border2); color: var(--text);
    padding: 12px 22px; border-radius: 12px; font-size: 13px; font-weight: 600;
    box-shadow: var(--shadow); z-index: 100; opacity: 0; transition: all 0.3s;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-faint); grid-column: 1 / -1; }
  .empty-state .icon { font-size: 48px; margin-bottom: 14px; opacity: 0.5; }

  /* ══════════════ MOBILE ══════════════ */
  @media (max-width: 768px) {
    body { overflow-x: hidden; }

    /* Topbar kompaktnejši */
    .topbar { padding: 10px 14px; gap: 10px; }
    .brand h1 { font-size: 15px; }
    .brand .sub { font-size: 10px; }
    .brand .logo { width: 30px; height: 30px; font-size: 16px; }
    .global-stat { padding: 6px 11px; gap: 10px; order: 3; }
    .global-stat .ring { width: 38px; height: 38px; }
    .global-stat .ring svg { width: 38px; height: 38px; }
    .global-stat .meta .big { font-size: 13px; }
    .global-stat .meta .small { font-size: 9px; }
    .topbar-spacer { display: none; }
    .topbar label.btn, .topbar button.btn { flex: 1; text-align: center; }

    /* Wrap = en stolpec, brez fiksne širine */
    .wrap { padding: 12px; gap: 14px; grid-template-columns: 1fr; max-width: 100%; }

    /* Sidebar gre POD sezname (ne sticky ob strani) */
    .sidebar { position: static; top: auto; order: 99; }

    /* Shelf head — kompakten, progress v novo vrsto */
    .shelf-head { padding: 14px; gap: 10px; flex-wrap: wrap; }
    .shelf-name { font-size: 16px; }
    .shelf-count { font-size: 10px; }
    .shelf-prog { width: 100%; order: 5; margin-top: 4px; }
    .shelf-prog-bar { flex: 1; width: auto; }
    .shelf-head-spacer { display: none; }

    /* Skrij tabelo-glavo na mobile (kartice ne rabijo) */
    .item-head { display: none; }

    /* Toplo kremno ozadje za polico — kartice "plavajo" */
    .shelf-body { padding: 12px; background: var(--shelf-bg); }

    /* ITEM = bela KARTICA, ločena z razmikom */
    .item {
      display: flex; flex-direction: column; align-items: stretch;
      gap: 12px; padding: 14px; margin: 0 0 10px;
      border-radius: 14px;
      background: var(--panel); border: 1px solid var(--border);
    }
    .item:last-child { margin-bottom: 0; }
    .item.ok { background: var(--ok-bg); border-color: var(--ok-border); }
    .item.ni { background: var(--ni-bg); border-color: var(--ni-border); }
    /* skrij ID na mobile */
    .item .id-col { display: none; }

    /* Vrh kartice: SKU (bold, velik) + pozicija (večja, vidna) */
    .item .sku {
      font-size: 19px; font-weight: 800; letter-spacing: 0.2px;
      color: var(--text); order: 1;
    }
    .item .poz {
      font-size: 16px; font-weight: 700; order: 2; align-self: center;
      padding: 6px 14px; border-radius: 9px; letter-spacing: 0.3px;
    }
    /* Naziv polna širina */
    .item .naziv {
      font-size: 14px; order: 3; white-space: normal;
      line-height: 1.4; color: var(--text-dim);
    }

    /* Spodnja vrsta: stepper + ✓ + ✕ v ENI vrstici */
    .item-bottom {
      display: flex; align-items: center; gap: 8px; order: 4;
    }
    .item .qty-step {
      justify-content: center; gap: 8px; flex-shrink: 0;
      background: var(--panel3); border-radius: 10px; padding: 4px;
    }
    .qty-btn { width: 38px; height: 38px; font-size: 22px; border-radius: 9px; }
    .qty-val { font-size: 18px; min-width: 30px; }
    .qty-need { font-size: 11px; }
    /* cifra je klikabilna za direkten vnos */
    .qty-step > div[onclick] {
      cursor: pointer; border-radius: 8px; padding: 2px 6px;
      transition: background 0.12s;
    }
    .qty-step > div[onclick]:active { background: var(--panel); }

    .item-actions { display: flex; gap: 8px; flex: 1; }
    .act-btn { flex: 1; height: 46px; padding: 0; font-size: 19px; border-radius: 10px; font-weight: 800; }

    /* SKU + poz v isto vrsto z flex wrapper */
    .item-mobile-top {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; order: 1;
    }

    .tag-low { font-size: 10px; padding: 2px 7px; }

    /* Sidebar kartice */
    .manko-list { max-height: none; }
    .side-card { padding: 16px; }
  }

  /* Zelo ozki telefoni */
  @media (max-width: 380px) {
    .qty-btn { width: 34px; height: 36px; font-size: 20px; }
    .item .sku { font-size: 18px; }
    .item-bottom { gap: 6px; }
    .item .qty-step { gap: 4px; padding: 3px; }
  }
  /* ─── Zgodovina modal ─── */
  .hist-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(3px);
    align-items: flex-start; justify-content: center; padding: 40px 16px;
    overflow-y: auto;
  }
  .hist-overlay.show { display: flex; }
  .hist-modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 18px;
    width: 100%; max-width: 880px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    overflow: hidden; animation: histPop 0.2s ease;
  }
  @keyframes histPop { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .hist-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px; border-bottom: 1px solid var(--border);
  }
  .hist-head h2 { font-size: 18px; font-weight: 800; }
  .hist-close {
    background: var(--panel3); border: 1px solid var(--border2); color: var(--text);
    width: 34px; height: 34px; border-radius: 9px; cursor: pointer; font-size: 15px;
  }
  .hist-close:hover { background: var(--ni); border-color: var(--ni); color: #fff; }
  .hist-body { padding: 18px 22px; max-height: 70vh; overflow-y: auto; }
  .hist-sess {
    border: 1px solid var(--border); border-radius: 13px; padding: 14px 16px;
    margin-bottom: 12px; transition: border-color 0.12s;
  }
  .hist-sess:hover { border-color: var(--accent); }
  .hist-sess-top { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .hist-sess-date { font-weight: 800; font-size: 15px; }
  .hist-sess-meta { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; color: var(--text-dim); margin-top: 6px; }
  .hist-sess-meta b { color: var(--text); }
  .hist-sess-meta .ok { color: var(--ok); }
  .hist-sess-meta .ni { color: var(--ni); }
  .hist-sess-prog { flex: 1; min-width: 120px; height: 7px; background: var(--panel3); border-radius: 5px; overflow: hidden; }
  .hist-sess-prog > div { height: 100%; background: var(--ok); border-radius: 5px; }
  .hist-sess-pct { font-weight: 800; font-size: 13px; min-width: 42px; text-align: right; }
  .hist-sess-actions { display: flex; gap: 8px; margin-top: 10px; }
  .hist-sess-actions button {
    background: var(--panel3); border: 1px solid var(--border2); color: var(--text);
    padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600;
  }
  .hist-sess-actions .del:hover { background: var(--ni); border-color: var(--ni); color: #fff; }
  .hist-sess-actions .open:hover { background: var(--accent); border-color: var(--accent); }
  .hist-detail { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
  .hist-detail-row { display: grid; grid-template-columns: 110px 1fr 70px 80px; gap: 10px; padding: 6px 0; font-size: 12px; border-bottom: 1px solid var(--border); align-items: center; }
  .hist-detail-row .hsku { font-weight: 700; }
  .hist-detail-row .hst-ok { color: var(--ok); font-weight: 700; }
  .hist-detail-row .hst-ni { color: var(--ni); font-weight: 700; }
  .hist-empty { text-align: center; color: var(--text-dim); padding: 40px 0; }
  @media (max-width: 768px) {
    .hist-overlay { padding: 16px 10px; }
    .hist-detail-row { grid-template-columns: 1fr auto; }
    .hist-detail-row .hpoz, .hist-detail-row .hqty { display: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="logo">📦</div>
    <div>
      <h1>Nabiranje zaloge</h1>
      <div class="sub">maaarket · skladišče · v3</div>
    </div>
  </div>
  <div class="topbar-spacer"></div>

  <div class="global-stat" id="globalStat" style="display:none">
    <div class="ring">
      <svg width="44" height="44">
        <circle cx="22" cy="22" r="18" fill="none" stroke="var(--panel3)" stroke-width="5"></circle>
        <circle id="globalRing" cx="22" cy="22" r="18" fill="none" stroke="var(--ok)" stroke-width="5"
          stroke-linecap="round" stroke-dasharray="113" stroke-dashoffset="113"></circle>
      </svg>
      <div class="pct" id="globalPct">0%</div>
    </div>
    <div class="meta">
      <div class="big" id="globalDone">0 / 0</div>
      <div class="small" id="globalBreak">skupna uspešnost</div>
    </div>
  </div>

  <label class="btn btn-ghost btn-sm" style="cursor:pointer">
    📁 Naloži CSV
    <input type="file" id="csvInput" accept=".csv" style="display:none">
  </label>
  <button class="btn btn-ghost btn-sm" id="archiveBtn" onclick="archiveSession()" style="display:none">📦 Arhiviraj</button>
  <button class="btn btn-ghost btn-sm" onclick="openHistory()">🕓 Zgodovina</button>
</div>

<div class="wrap" id="wrap">
  <div class="empty-state" id="emptyState">
    <div class="icon">📋</div>
    <h2 style="color:var(--text-dim);font-weight:700">Ni aktivnega seznama</h2>
    <p style="margin-top:8px;font-size:13px">Naloži CSV izvoz za začetek nabiranja.</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Zgodovina modal -->
<div class="hist-overlay" id="histOverlay" onclick="if(event.target===this)closeHistory()">
  <div class="hist-modal">
    <div class="hist-head">
      <h2 id="histTitle">🕓 Zgodovina nabiranj</h2>
      <button class="hist-close" onclick="closeHistory()">✕</button>
    </div>
    <div class="hist-body" id="histBody"></div>
  </div>
</div>

<script src="/static/zaloga.js?v=20260528j"></script>
</body>
</html>
