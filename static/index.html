
<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Ads Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f11;
  --surface: #1a1a1f;
  --surface2: #222228;
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.16);
  --text: #f0f0f2;
  --text-secondary: #888892;
  --text-tertiary: #555560;
  --accent: #4f7fff;
  --accent-dim: rgba(79,127,255,0.12);
  --accent-border: rgba(79,127,255,0.4);
  --green: #3ecf8e;
  --green-dim: rgba(62,207,142,0.12);
  --green-border: rgba(62,207,142,0.35);
  --red: #ff5757;
  --chip-off: #2a2a32;
  --chip-on: #4f7fff;
  --radius: 10px;
  --radius-lg: 14px;
}
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2.5rem 1.5rem;
  display: flex;
  justify-content: center;
}
.layout { width: 100%; max-width: 560px; }
.logo { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
.logo-icon { width: 40px; height: 40px; border-radius: 11px; background: var(--accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.logo-icon svg { width: 20px; height: 20px; fill: white; }
.logo-name { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
.logo-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
.section-label { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; display: block; }
.mode-row { display: flex; gap: 6px; margin-bottom: 1.25rem; background: var(--surface2); padding: 4px; border-radius: var(--radius); }
.mode-btn { flex: 1; height: 34px; border-radius: 7px; border: none; background: transparent; color: var(--text-tertiary); font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; }
.mode-btn:hover { color: var(--text-secondary); }
.mode-btn.on { background: var(--surface); color: var(--text); border: 1px solid var(--border-hover); }
.mode-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.url-wrap { position: relative; display: flex; align-items: center; margin-bottom: 10px; }
.url-icon { position: absolute; left: 12px; pointer-events: none; display: flex; }
.url-icon svg { width: 14px; height: 14px; stroke: var(--text-tertiary); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
input[type="text"] { width: 100%; height: 44px; padding: 0 14px 0 36px; font-size: 14px; font-family: 'DM Sans', sans-serif; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface2); color: var(--text); transition: border-color 0.15s; }
input[type="text"]:focus { outline: none; border-color: var(--accent-border); box-shadow: 0 0 0 3px var(--accent-dim); }
input[type="text"]::placeholder { color: var(--text-tertiary); }
input[type="text"].error { border-color: var(--red) !important; }
textarea.input-area { width: 100%; min-height: 130px; padding: 12px 14px; font-size: 13.5px; font-family: 'DM Sans', sans-serif; line-height: 1.65; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface2); color: var(--text); resize: vertical; transition: border-color 0.15s; margin-bottom: 10px; }
textarea.input-area:focus { outline: none; border-color: var(--accent-border); box-shadow: 0 0 0 3px var(--accent-dim); }
textarea.input-area::placeholder { color: var(--text-tertiary); }
textarea.input-area.error { border-color: var(--red) !important; }
.btn-gen { width: 100%; height: 44px; border-radius: var(--radius); border: none; background: var(--accent); color: white; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; letter-spacing: -0.2px; transition: opacity 0.15s, transform 0.1s, background 0.2s; }
.btn-gen:hover { opacity: 0.9; }
.btn-gen:active { transform: scale(0.98); }
.btn-gen:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-gen svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.sep { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }
.counters { display: flex; gap: 1.5rem; }
.counter-group { flex: 1; }
.counter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.cnt-btn { width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-secondary); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; transition: all 0.12s; font-family: 'DM Mono', monospace; }
.cnt-btn:hover { border-color: var(--border-hover); color: var(--text); }
.cnt-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.cnt-val { font-size: 16px; font-weight: 600; color: var(--text); min-width: 22px; text-align: center; font-family: 'DM Mono', monospace; }
.cnt-max { font-size: 11px; color: var(--text-tertiary); }
.chips { display: flex; gap: 3px; }
.chip { height: 4px; flex: 1; border-radius: 2px; background: var(--chip-off); transition: background 0.2s; }
.chip.on { background: var(--chip-on); }
.counters-divider { width: 1px; background: var(--border); align-self: stretch; }
.hint { display: flex; align-items: flex-start; gap: 8px; padding: 10px 12px; background: var(--surface2); border-radius: 8px; margin-top: 1.25rem; }
.hint svg { width: 13px; height: 13px; stroke: var(--text-tertiary); fill: none; stroke-width: 1.5; flex-shrink: 0; margin-top: 1px; }
.hint-text { font-size: 12px; color: var(--text-tertiary); line-height: 1.6; }

/* Loading */
.loading { display: none; text-align: center; padding: 2.5rem 1rem; }
.loading.show { display: block; }
.spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1rem; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text-tertiary); }

/* Error */
.error-msg { display: none; padding: 10px 14px; background: rgba(255,87,87,0.1); border: 1px solid rgba(255,87,87,0.3); border-radius: var(--radius); font-size: 13px; color: var(--red); margin-top: 10px; }
.error-msg.show { display: block; }

/* Results */
.results { display: none; }
.results.show { display: block; }
.product-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px 10px; margin-bottom: 1.25rem; }
.tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.tab { padding: 5px 12px; border-radius: var(--radius); border: 1px solid var(--border); font-size: 13px; cursor: pointer; background: var(--surface); color: var(--text-tertiary); transition: all 0.12s; }
.tab:hover { color: var(--text-secondary); border-color: var(--border-hover); }
.tab.on { background: var(--surface2); color: var(--text); font-weight: 500; border-color: var(--border-hover); }
.panel { display: none; }
.panel.on { display: block; }
.ad-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 10px; }
.ad-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.ad-lbl { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.6px; }
.cp-btn { height: 26px; padding: 0 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-tertiary); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.12s; }
.cp-btn:hover { border-color: var(--border-hover); color: var(--text); }
.cp-btn.ok { color: var(--green); border-color: var(--green-border); background: var(--green-dim); }
.ad-body { font-size: 14px; color: var(--text); line-height: 1.7; white-space: pre-wrap; }
.ad-hl { font-size: 15px; font-weight: 500; color: var(--text); }
.back-btn { width: 100%; height: 38px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; color: var(--text-tertiary); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 0.5rem; transition: all 0.12s; }
.back-btn:hover { border-color: var(--border-hover); color: var(--text); }
</style>
</head>
<body>
<div class="layout">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
    </div>
    <div>
      <div class="logo-name">Meta Ads Generator</div>
      <div class="logo-sub">FB / Instagram — 10 jezikov</div>
    </div>
  </div>

  <!-- INPUT FORM -->
  <div id="formSection">
    <div class="card">
      <span class="section-label">Način vnosa</span>
      <div class="mode-row">
        <button class="mode-btn on" id="mode-url" onclick="setMode('url')">
          <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          URL izdelka
        </button>
        <button class="mode-btn" id="mode-txt" onclick="setMode('txt')">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Opis izdelka
        </button>
      </div>

      <div id="input-url-wrap">
        <span class="section-label">URL izdelka</span>
        <div class="url-wrap">
          <span class="url-icon">
            <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          </span>
          <input type="text" id="urlInput" placeholder="https://www.maaarket.si/izdelek/..." />
        </div>
      </div>

      <div id="input-txt-wrap" style="display:none">
        <span class="section-label">Opis izdelka</span>
        <textarea class="input-area" id="txtInput" placeholder="Prilepi sem naziv, opis, lastnosti, bullet pointe — karkoli iz strani izdelka..."></textarea>
      </div>

      <button class="btn-gen" id="btnGen" onclick="generate()">
        <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Generiraj oglase
      </button>

      <div class="error-msg" id="errorMsg"></div>

      <div class="sep"></div>

      <div class="counters">
        <div class="counter-group">
          <span class="section-label">Primary Texts</span>
          <div class="counter-row">
            <button class="cnt-btn" id="pt-minus" onclick="change('pt',-1)">−</button>
            <span class="cnt-val" id="pt-val">1</span>
            <button class="cnt-btn" id="pt-plus" onclick="change('pt',1)">+</button>
            <span class="cnt-max">max 5</span>
          </div>
          <div class="chips" id="pt-chips"></div>
        </div>
        <div class="counters-divider"></div>
        <div class="counter-group">
          <span class="section-label">Headlines</span>
          <div class="counter-row">
            <button class="cnt-btn" id="hl-minus" onclick="change('hl',-1)">−</button>
            <span class="cnt-val" id="hl-val">1</span>
            <button class="cnt-btn" id="hl-plus" onclick="change('hl',1)">+</button>
            <span class="cnt-max">max 5</span>
          </div>
          <div class="chips" id="hl-chips"></div>
        </div>
      </div>

      <div class="hint">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span class="hint-text" id="hintText">Generiram 1× Primary Text in 1× Headline v 10 jezikih.</span>
      </div>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">Generiram oglase in prevode...</div>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="results" id="results">
    <div class="product-badge" id="productBadge">🛍️ Izdelek</div>
    <div class="tabs" id="tabs"></div>
    <div id="panels"></div>
    <button class="back-btn" onclick="goBack()">← Nov izdelek</button>
  </div>
</div>

<textarea id="clip" style="position:fixed;left:-9999px;top:0;opacity:0"></textarea>

<script>
const state = { pt: 1, hl: 1, mode: 'url' };
const MAX = 5;
const TABS = [
  {code:'sl',name:'🇸🇮 SL'},{code:'hr',name:'🇭🇷 HR'},{code:'rs',name:'🇷🇸 RS'},
  {code:'hu',name:'🇭🇺 HU'},{code:'cz',name:'🇨🇿 CZ'},{code:'sk',name:'🇸🇰 SK'},
  {code:'pl',name:'🇵🇱 PL'},{code:'gr',name:'🇬🇷 GR'},{code:'ro',name:'🇷🇴 RO'},{code:'bg',name:'🇧🇬 BG'}
];

function setMode(m) {
  state.mode = m;
  document.getElementById('mode-url').classList.toggle('on', m === 'url');
  document.getElementById('mode-txt').classList.toggle('on', m === 'txt');
  document.getElementById('input-url-wrap').style.display = m === 'url' ? 'block' : 'none';
  document.getElementById('input-txt-wrap').style.display = m === 'txt' ? 'block' : 'none';
}

function change(type, dir) {
  state[type] = Math.min(MAX, Math.max(1, state[type] + dir));
  update();
}

function update() {
  ['pt', 'hl'].forEach(t => {
    document.getElementById(t + '-val').textContent = state[t];
    document.getElementById(t + '-minus').disabled = state[t] <= 1;
    document.getElementById(t + '-plus').disabled = state[t] >= MAX;
    const chips = document.getElementById(t + '-chips');
    chips.innerHTML = '';
    for (let i = 0; i < MAX; i++) {
      const c = document.createElement('div');
      c.className = 'chip' + (i < state[t] ? ' on' : '');
      chips.appendChild(c);
    }
  });
  document.getElementById('hintText').textContent =
    `Generiram ${state.pt}× Primary Text in ${state.hl}× Headline v 10 jezikih.`;
}

async function generate() {
  let input = '';
  if (state.mode === 'url') {
    input = document.getElementById('urlInput').value.trim();
    if (!input) { flash('urlInput'); return; }
  } else {
    input = document.getElementById('txtInput').value.trim();
    if (!input) { flash('txtInput'); return; }
  }

  const btn = document.getElementById('btnGen');
  btn.disabled = true;
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('loading').classList.add('show');

  try {
    const res = await fetch('/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        input,
        mode: state.mode,
        pt_count: state.pt,
        hl_count: state.hl
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderResults(data);

  } catch (e) {
    document.getElementById('loading').classList.remove('show');
    const err = document.getElementById('errorMsg');
    err.textContent = 'Napaka: ' + (e.message || 'Poskusi znova.');
    err.classList.add('show');
    btn.disabled = false;
  }
}

function renderResults(data) {
  document.getElementById('loading').classList.remove('show');
  document.getElementById('formSection').style.display = 'none';
  document.getElementById('results').classList.add('show');
  document.getElementById('productBadge').textContent = '🛍️ ' + (data.product || 'Izdelek');

  const tabsEl = document.getElementById('tabs');
  const panelsEl = document.getElementById('panels');
  tabsEl.innerHTML = '';
  panelsEl.innerHTML = '';

  TABS.forEach((t, i) => {
    const d = data[t.code];
    if (!d) return;

    const tab = document.createElement('div');
    tab.className = 'tab' + (i === 0 ? ' on' : '');
    tab.id = 'tab-' + t.code;
    tab.textContent = t.name;
    tab.onclick = () => sw(t.code);
    tabsEl.appendChild(tab);

    const pts = Array.isArray(d.pt) ? d.pt : [d.pt];
    const hls = Array.isArray(d.hl) ? d.hl : [d.hl];

    let html = '';
    pts.forEach((pt, idx) => {
      html += `<div class="ad-card">
        <div class="ad-hdr">
          <span class="ad-lbl">Primary Text${pts.length > 1 ? ' ' + (idx+1) : ''}</span>
          <button class="cp-btn" id="cp-pt-${t.code}-${idx}" onclick="doCopy('cp-pt-${t.code}-${idx}',${JSON.stringify(pt)})">Kopiraj</button>
        </div>
        <div class="ad-body">${esc(pt)}</div>
      </div>`;
    });
    hls.forEach((hl, idx) => {
      html += `<div class="ad-card">
        <div class="ad-hdr">
          <span class="ad-lbl">Headline${hls.length > 1 ? ' ' + (idx+1) : ''}</span>
          <button class="cp-btn" id="cp-hl-${t.code}-${idx}" onclick="doCopy('cp-hl-${t.code}-${idx}',${JSON.stringify(hl)})">Kopiraj</button>
        </div>
        <div class="ad-hl">${esc(hl)}</div>
      </div>`;
    });

    const panel = document.createElement('div');
    panel.className = 'panel' + (i === 0 ? ' on' : '');
    panel.id = 'panel-' + t.code;
    panel.innerHTML = html;
    panelsEl.appendChild(panel);
  });
}

function sw(code) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.getElementById('tab-' + code).classList.add('on');
  document.getElementById('panel-' + code).classList.add('on');
}

function doCopy(id, text) {
  const ta = document.getElementById('clip');
  ta.value = text;
  ta.select();
  ta.setSelectionRange(0, 99999);
  document.execCommand('copy');
  const btn = document.getElementById(id);
  btn.textContent = '✓ Kopirano';
  btn.classList.add('ok');
  setTimeout(() => { btn.textContent = 'Kopiraj'; btn.classList.remove('ok'); }, 2000);
}

function goBack() {
  document.getElementById('results').classList.remove('show');
  document.getElementById('formSection').style.display = 'block';
  document.getElementById('btnGen').disabled = false;
  document.getElementById('results').innerHTML = '';
  document.getElementById('tabs').innerHTML = '';
  document.getElementById('panels').innerHTML = '';
}

function flash(id) {
  const el = document.getElementById(id);
  el.classList.add('error');
  el.focus();
  setTimeout(() => el.classList.remove('error'), 1500);
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

update();
</script>
</body>
</html>
