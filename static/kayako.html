<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎫 Kayako Tickets · Suban</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f6f7fb; --surface:#ffffff; --surface2:#f2f4fa; --bg-secondary:#eef0f6;
  --border:#e3e6ef; --text:#1a1d27; --text-secondary:#5a6178; --text-tertiary:#8a90a5;
  --accent:#534AB7; --green:#22a06b; --red:#ef4444; --radius:8px;
}
* { box-sizing:border-box; }
body { margin:0; font-family:'DM Sans',system-ui,sans-serif; background:var(--bg); color:var(--text); }
.top { display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding:12px 16px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:20; }
.top h1 { font-size:15px; margin:0 8px 0 0; }
select, button, textarea { font-family:inherit; }
select { padding:7px 10px; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface); color:var(--text); font-size:12px; }
.btn { padding:7px 14px; border:none; border-radius:var(--radius); font-size:12px; font-weight:600; cursor:pointer; }
.btn-p { background:var(--accent); color:#fff; }
.btn-g { background:var(--green); color:#fff; font-weight:700; padding:9px 16px; }
.btn-o { background:transparent; color:var(--text); border:1px solid var(--border); }
.grid { display:grid; grid-template-columns:360px minmax(0,1fr); gap:12px; padding:12px 16px; align-items:start; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:10px; }
#tkList { max-height:calc(100vh - 130px); overflow-y:auto; }
.trow { padding:10px 12px; border-bottom:1px solid var(--border); cursor:pointer; }
.trow:hover, .trow.on { background:var(--bg-secondary); }
.trow .s { font-size:12px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.trow .m { display:flex; justify-content:space-between; gap:6px; margin-top:3px; font-size:11px; color:var(--text-secondary); }
.trow .m .r { font-size:10px; color:var(--text-tertiary); white-space:nowrap; }
#detWrap { padding:14px; min-height:300px; }
.post { margin-bottom:10px; padding:10px 12px; border-radius:10px; max-width:88%; background:var(--bg-secondary); border:1px solid var(--border); }
.post.staff { margin-left:auto; background:rgba(83,74,183,0.10); border-color:rgba(83,74,183,0.25); }
.post .who { font-size:10px; font-weight:700; color:var(--text-secondary); margin-bottom:4px; }
.post.staff .who { color:var(--accent); }
.post .txt { font-size:12.5px; white-space:pre-wrap; line-height:1.5; word-break:break-word; }
#thread { max-height:calc(100vh - 420px); overflow-y:auto; padding-right:4px; }
textarea { width:100%; min-height:130px; padding:10px; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface2); color:var(--text); font-size:13px; resize:vertical; line-height:1.5; }
.badge { font-size:11px; font-weight:700; padding:4px 10px; border-radius:12px; white-space:nowrap; }
.badge.s1 { background:rgba(239,68,68,0.12); color:var(--red); }
.badge.s3 { background:rgba(34,160,107,0.12); color:var(--green); }
.badge.sx { background:var(--bg-secondary); color:var(--text-secondary); }
.muted { font-size:11px; color:var(--text-tertiary); }
@media (max-width: 800px) {
  .grid { grid-template-columns:1fr; }
  #tkList { max-height:38vh; }
  #thread { max-height:none; }
}
</style>
</head>
<body>

<div class="top">
  <h1>🎫 Kayako Tickets</h1>
  <select id="tkBrand" onchange="tkLoadInbox()">
    <option value="maaarket">Maaarket</option>
    <option value="silux">Silux</option>
  </select>
  <select id="tkStatus" onchange="tkLoadInbox()">
    <option value="1">🔴 Odprto</option>
    <option value="2">🟡 V teku</option>
    <option value="3">🟢 Zaprto</option>
    <option value="4">📦 Naročila</option>
  </select>
  <button class="btn btn-p" id="tkLoadBtn" onclick="tkLoadInbox()">🔄 Naloži</button>
  <span style="flex:1"></span>
  <span class="muted">Odgovarjam kot:</span>
  <select id="tkStaff" onchange="try{localStorage.setItem('tk_staff',this.value)}catch(e){}"></select>
  <span id="tkInboxInfo" class="muted"></span>
</div>

<div class="grid">
  <div class="card">
    <div id="tkList"><div style="padding:20px;text-align:center;font-size:12px;color:var(--text-tertiary)">⏳ Nalagam...</div></div>
  </div>
  <div class="card">
    <div id="detWrap">
      <div id="tkDetail" style="font-size:12px;color:var(--text-tertiary);text-align:center;padding:40px 0">← Izberi ticket s seznama</div>
      <div id="tkReplyBox" style="display:none;margin-top:14px;border-top:1px solid var(--border);padding-top:12px">
        <textarea id="tkReplyText" placeholder="Napiši odgovor stranki..."></textarea>
        <div style="display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap">
          <button class="btn btn-g" id="tkSendCloseBtn" onclick="tkReply(true)">📨 Pošlji &amp; zapri</button>
          <button class="btn btn-o" id="tkSendBtn" onclick="tkReply(false)">📨 Pošlji (pusti odprto)</button>
          <span id="tkReplyStatus" style="font-size:11px;color:var(--text-secondary)"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let _tkCurrentId = null;

async function tkInit() {
  try {
    const r = await fetch('/kayako-staff');
    const d = await r.json();
    const sel = document.getElementById('tkStaff');
    if (d.ok && sel) {
      sel.innerHTML = Object.keys(d.staff).map(u => `<option value="${u}">${u}</option>`).join('');
      try { const saved = localStorage.getItem('tk_staff'); if (saved && d.staff[saved] != null) sel.value = saved; } catch(e) {}
    }
  } catch(e) {}
  tkLoadInbox();
}

async function tkLoadInbox() {
  const btn = document.getElementById('tkLoadBtn');
  const list = document.getElementById('tkList');
  const info = document.getElementById('tkInboxInfo');
  btn.disabled = true; btn.textContent = '⏳ ...';
  try {
    const brand = document.getElementById('tkBrand').value;
    const status = document.getElementById('tkStatus').value;
    const r = await fetch(`/kayako-inbox?brand=${brand}&status=${status}&count=100`);
    const d = await r.json();
    if (!d.ok) { list.innerHTML = `<div style="padding:16px;font-size:12px;color:var(--red)">✗ ${esc(d.error||'napaka')}</div>`; return; }
    info.textContent = `${d.count} ticketov`;
    if (!d.tickets.length) { list.innerHTML = '<div style="padding:20px;text-align:center;font-size:12px;color:var(--text-tertiary)">Ni ticketov v tem statusu. 🎉</div>'; return; }
    list.innerHTML = d.tickets.map(t => `
      <div class="trow" id="tkRow-${t.id}" onclick="tkOpen('${t.id}')">
        <div class="s">${esc(t.subject||'(brez naslova)')}</div>
        <div class="m">
          <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.fullname||t.email||'—')}</span>
          <span class="r">#${t.id} · 💬 ${t.replies}</span>
        </div>
      </div>`).join('');
  } catch(e) {
    list.innerHTML = `<div style="padding:16px;font-size:12px;color:var(--red)">✗ ${esc(e.message)}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = '🔄 Naloži';
  }
}

function _stripHtml(s) {
  const d = document.createElement('div');
  d.innerHTML = (s || '').replace(/<br\s*\/?>/gi, '\n').replace(/<\/p>/gi, '\n');
  return (d.textContent || d.innerText || '').trim();
}

async function tkOpen(id) {
  _tkCurrentId = id;
  document.querySelectorAll('.trow').forEach(el => el.classList.remove('on'));
  const row = document.getElementById('tkRow-' + id);
  if (row) row.classList.add('on');
  const det = document.getElementById('tkDetail');
  det.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-tertiary)">⏳ Nalagam pogovor...</div>';
  document.getElementById('tkReplyBox').style.display = 'none';
  try {
    const r = await fetch('/kayako-ticket/' + id);
    const d = await r.json();
    if (!d.ok) { det.innerHTML = `<div style="color:var(--red);font-size:12px">✗ ${esc(d.error||'napaka')}</div>`; return; }
    const t = d.ticket;
    const posts = (t.posts || []).map(p => {
      const st = p.role === 'staff';
      return `<div class="post${st?' staff':''}">
        <div class="who">${st ? '👤 ' : '✉️ '}${esc(p.name||(st?'Podpora':'Stranka'))}</div>
        <div class="txt">${esc(_stripHtml(p.text))}</div>
      </div>`;
    }).join('');
    const bcls = t.status_id === '1' ? 's1' : (t.status_id === '3' ? 's3' : 'sx');
    det.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:start;gap:10px;margin-bottom:12px;text-align:left">
        <div>
          <div style="font-size:14px;font-weight:800">${esc(t.subject||'(brez naslova)')}</div>
          <div style="font-size:11px;color:var(--text-secondary);margin-top:2px">${esc(t.fullname||'')} · ${esc(t.email||'')} · #${t.id}</div>
        </div>
        <span class="badge ${bcls}">${esc(t.status_name||'')}</span>
      </div>
      <div id="thread" style="text-align:left">${posts || '<div style="color:var(--text-tertiary);font-size:12px">Ni vsebine.</div>'}</div>`;
    document.getElementById('tkReplyBox').style.display = 'block';
    document.getElementById('tkReplyStatus').textContent = '';
    const th = document.getElementById('thread');
    if (th) th.scrollTop = th.scrollHeight;
  } catch(e) {
    det.innerHTML = `<div style="color:var(--red);font-size:12px">✗ ${esc(e.message)}</div>`;
  }
}

async function tkReply(closeTicket) {
  if (!_tkCurrentId) return;
  const txt = document.getElementById('tkReplyText').value.trim();
  const status = document.getElementById('tkReplyStatus');
  if (!txt) { status.textContent = '⚠ Napiši odgovor.'; status.style.color = '#d97706'; return; }
  const staff = document.getElementById('tkStaff').value;
  const b1 = document.getElementById('tkSendCloseBtn'), b2 = document.getElementById('tkSendBtn');
  b1.disabled = true; b2.disabled = true;
  status.style.color = 'var(--text-secondary)'; status.textContent = '⏳ Pošiljam...';
  try {
    const r = await fetch('/kayako-reply', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ ticket_id: _tkCurrentId, contents: txt, staff, close: !!closeTicket }) });
    const d = await r.json();
    if (!d.ok) { status.style.color = 'var(--red)'; status.textContent = '✗ ' + (d.error || 'napaka'); return; }
    status.style.color = 'var(--green)';
    status.textContent = closeTicket ? (d.closed ? '✓ Poslano & zaprto' : '✓ Poslano (zapiranje ni uspelo — zapri ročno)') : '✓ Poslano';
    document.getElementById('tkReplyText').value = '';
    tkOpen(_tkCurrentId);
    if (closeTicket) tkLoadInbox();
  } catch(e) {
    status.style.color = 'var(--red)'; status.textContent = '✗ ' + e.message;
  } finally {
    b1.disabled = false; b2.disabled = false;
  }
}

tkInit();
</script>
</body>
</html>
